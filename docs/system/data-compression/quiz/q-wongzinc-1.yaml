author: wongzinc
date: 2026-05-28
question: |
  有三個小檔案 X、Y、Z，壓縮後的大小分別為 1.2KB、2.8KB、3.5KB。在強制對齊邊界的傳統 4KB Block 系統中，
  這三個檔案總共會消耗多少實體空間？如果改用 EROFS 的 Continuous Packing 技術，又會消耗多少實體空間？
options:
  - text: "傳統：8KB / EROFS:8KB"
    explanation: |
      傳統檔案系統不允許兩個檔案共用同一個 Block。X 與 Y 會各自配置一個獨立的 4KB Block，
      因此三個檔案至少需要 3 個 Block，共 12KB，不會是 8KB。
  - text: "傳統：7.5KB / EROFS:7.5KB"
    explanation: |
      7.5KB 是三個檔案的邏輯大小總和（1.2 + 2.8 + 3.5），不是實體佔用空間。
  - text: "傳統：12KB / EROFS:8KB"
    correct: true
    explanation: |
      **傳統 12KB**：每個檔案獨佔一個 Block → $3 \times 4\text{KB} = 12\text{KB}$。
      **EROFS 8KB**：Continuous Packing 讓 X + Y 共用 Block 1、Z 用 Block 2 → $2 \times 4\text{KB} = 8\text{KB}$。
  - text: "傳統：12KB / EROFS:7.5KB"
    explanation: |
      EROFS 的最小配置單位是一個 Block。動用第 2 個 Block 後，無論填入多少，
      實體消耗都是 $2 \times 4\text{KB} = 8\text{KB}$