author: wongzinc
date: 2026-05-28
question: |
  你正在開發一款平價的物聯網 (IoT) 攝影機，設備上的 RAM 只有極可憐的 64MB。
  你需要一個壓縮檔案系統來存放唯讀的韌體檔案，你會強烈建議團隊採用 Fixed-Output 還是 Fixed-Input 策略？
options:
  - text: "Fixed-Input，因為它在進行隨機讀取時的 CPU 消耗最低。"
    explanation: |
      **死因：觀念顛倒，Fixed-Input 的隨機讀取成本其實很高。**
      進行隨機讀取 (Random Access) 時，Fixed-Input 的操作步驟非常繁瑣：它要先花 CPU 算力去查 Index Table → 找出位置 → 把那一大塊不規則的 Chunk 讀出來 → 全部解壓縮。
      這個過程牽涉到指標跳躍與龐大的解壓動作，不僅不省 CPU，延遲 (Latency) 也比 Fixed-Output 差。
  - text: "兩者皆可，只要壓縮演算法選擇 LZ4 就能解決 RAM 不足的問題。"
    explanation: |
      **死因：搞錯了「演算法」與「儲存架構」的職責。**
      LZ4 是一種極優秀的「壓縮演算法」，它的超能力是解壓速度極快，能大幅減輕 CPU 的負擔。但它無法改變底層位址 (Addressing) 的物理定律。
      如果你選了 Fixed-Input，就算你配上地表最快的 LZ4，系統仍然需要那張龐大的 Index Table 才能知道 LZ4 壓縮的資料被放在硬碟的哪裡。
      LZ4 無法幫你省下這張表的 RAM 消耗。這兩個是獨立的設計維度(映射策略 vs 壓縮演算法)，不能混為一談。
  - text: "Fixed-Output，因為它可以透過數學公式 $O(1)$ 直接算出實體位址，幾乎不佔用 RAM。"
    correct: true
    explanation: |
      Fixed-Output 最強大的優勢就是「規律」。因為每個壓縮出來的區塊都被強制鎖定在 4KB，系統完全不需要額外記住「資料在哪裡」。
      當系統想讀取第 100 個 Block 時，直接用簡單的數學公式 `100 * 4KB = 400KB`，就知道要去硬碟的 400KB 處讀取。
      這不需要在 RAM 裡面建立任何「尋址地圖 (Mapping Table)」，因此 RAM 的消耗趨近於零，完美避開了 IoT 設備 64MB RAM 的死穴。
  - text: "Fixed-Input，因為它可以獲得最好的壓縮率，節省 Flash 儲存空間。"
    explanation: |
      **死因：顧此失彼，RAM 撐不住 Mapping Table 的開銷。**
      這個選項前半段說的是對的，Fixed-Input 確實能把資料壓最小，省下硬碟 (Flash) 空間。
      但它的致命傷在於：因為每個區塊壓縮後的大小都不一樣(例如 2.1KB、3.5KB、1.8KB)，系統無法用數學公式推算位置。
      為了找到資料，作業系統必須在 RAM 裡面載入一張龐大的「索引表 (Index Table)」來記錄每一個區塊的偏移量。
      對於只有 64MB RAM 的設備來說，光是這張表可能就會吃掉好幾 MB，嚴重擠壓應用程式的運行空間，甚至導致系統 Out of Memory (OOM) 崩潰。